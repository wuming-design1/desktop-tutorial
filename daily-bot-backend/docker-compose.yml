version: '3.8'

services:
  backend:
    build: .
    container_name: daily-bot-backend
    restart: unless-stopped
    ports:
      - '${PORT:-3001}:3001'
    volumes:
      # 持久化数据库文件
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-3001}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - DB_PATH=/app/data/app.db
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:5173}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    networks:
      - app-network

  # 可选：前端服务（生产环境部署）
  # frontend:
  #   image: nginx:alpine
  #   container_name: daily-bot-frontend
  #   restart: unless-stopped
  #   ports:
  #     - '80:80'
  #   volumes:
  #     - ../daily-bot-vue/dist:/usr/share/nginx/html
  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf
  #   depends_on:
  #     - backend
  #   networks:
  #     - app-network

networks:
  app-network:
    driver: bridge