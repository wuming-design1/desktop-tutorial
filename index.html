<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>运动场人流监测与预约系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#0a0a1a;font-family:'PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif}
#canvas-container{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1}
canvas{display:block}

.panel{
  position:fixed;z-index:10;color:#fff;
  background:rgba(15,20,40,0.55);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:18px;padding:18px 20px;
  box-shadow:0 8px 32px rgba(0,0,0,0.35);
  pointer-events:auto;
  transition:all 0.3s ease;
}
.panel:hover{background:rgba(15,20,40,0.7);border-color:rgba(255,255,255,0.22)}

.panel-title{font-size:14px;font-weight:700;margin-bottom:12px;letter-spacing:0.5px;
  display:flex;align-items:center;gap:8px;
  padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,0.1)}
.panel-title .dot{width:8px;height:8px;border-radius:50%;display:inline-block;animation:pulse 2s infinite}
.dot.green{background:#4ade80;box-shadow:0 0 8px #4ade80}
.dot.yellow{background:#facc15;box-shadow:0 0 8px #facc15}
.dot.red{background:#ef4444;box-shadow:0 0 8px #ef4444}
.dot.gray{background:#6b7280;box-shadow:0 0 4px #6b7280}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

#panel-crowd{top:20px;left:20px;width:300px;max-height:calc(100vh - 40px);overflow-y:auto}
#panel-crowd .stat-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:13px}
#panel-crowd .stat-value{font-weight:700;font-size:16px;font-variant-numeric:tabular-nums}
#panel-crowd .density-bar{height:5px;border-radius:3px;margin-top:3px;transition:width 0.5s}
#panel-crowd .zone-item{margin-bottom:8px}
#panel-crowd .zone-name{font-size:12px;color:#94a3b8;margin-bottom:2px}

#panel-weather{top:20px;right:20px;width:280px}
#panel-weather .weather-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px}
#panel-weather .weather-item{background:rgba(255,255,255,0.05);border-radius:10px;padding:10px;text-align:center}
#panel-weather .weather-item .label{color:#94a3b8;font-size:11px;margin-bottom:4px}
#panel-weather .weather-item .value{font-size:18px;font-weight:700}
#panel-weather .warning{color:#ef4444;animation:pulse 1.5s infinite}
#panel-weather .recommend{margin-top:10px;padding:10px;background:rgba(255,255,255,0.05);border-radius:10px;font-size:12px;line-height:1.6}
#panel-weather .recommend .rec-title{font-weight:700;color:#60a5fa;margin-bottom:4px}

#panel-reserve{bottom:20px;right:20px;width:340px;max-height:350px;overflow-y:auto}
#panel-reserve .venue-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.06);font-size:12px}
#panel-reserve .venue-name{width:50px;font-weight:700;flex-shrink:0}
#panel-reserve .timeline{display:flex;gap:2px;flex:1}
#panel-reserve .time-slot{width:28px;height:22px;border-radius:4px;cursor:pointer;font-size:10px;
  display:flex;align-items:center;justify-content:center;transition:all 0.2s;
  background:rgba(255,255,255,0.08);color:#94a3b8}
#panel-reserve .time-slot.available{background:rgba(74,222,128,0.15);color:#4ade80;border:1px solid rgba(74,222,128,0.25)}
#panel-reserve .time-slot.available:hover{background:rgba(74,222,128,0.3);transform:scale(1.1)}
#panel-reserve .time-slot.booked{background:rgba(239,68,68,0.15);color:#ef4444;border:1px solid rgba(239,68,68,0.25);cursor:not-allowed}
#panel-reserve .time-slot.selected{background:rgba(96,165,250,0.3);color:#60a5fa;border:1px solid rgba(96,165,250,0.5);box-shadow:0 0 8px rgba(96,165,250,0.3)}
#panel-reserve .time-label{display:flex;justify-content:space-between;padding:0 54px 4px;font-size:10px;color:#64748b}
#panel-reserve .reserve-action{margin-top:10px;display:flex;gap:8px;align-items:center}
#panel-reserve .reserve-action select{background:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.2);border-radius:8px;padding:6px 10px;font-size:12px;outline:none}
#panel-reserve .reserve-action select option{background:#1e293b;color:#fff}
#panel-reserve .btn-reserve{background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;border:none;border-radius:8px;padding:7px 16px;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s}
#panel-reserve .btn-reserve:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(59,130,246,0.4)}
#panel-reserve .btn-reserve:disabled{opacity:0.4;cursor:not-allowed;transform:none}

#legend{position:fixed;bottom:20px;left:20px;z-index:10;display:flex;align-items:center;gap:6px;
  background:rgba(15,20,40,0.55);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:10px 14px;font-size:11px;color:#94a3b8}
#legend .gradient{width:120px;height:10px;border-radius:5px;
  background:linear-gradient(to right,#2563eb,#22c55e,#eab308,#ef4444)}

#tooltip{position:fixed;z-index:20;pointer-events:none;opacity:0;transition:opacity 0.15s;
  background:rgba(15,20,40,0.9);color:#fff;padding:8px 12px;border-radius:8px;font-size:12px;
  border:1px solid rgba(255,255,255,0.15);white-space:nowrap}

@media(max-width:768px){
  #panel-crowd{width:260px;top:10px;left:10px;padding:12px 14px}
  #panel-weather{width:240px;top:10px;right:10px;padding:12px 14px}
  #panel-reserve{width:calc(100vw - 20px);bottom:10px;right:10px;padding:12px 14px}
  #legend{bottom:10px;left:10px;padding:8px 10px}
}
</style>
</head>
<body>

<div id="canvas-container"></div>

<div id="panel-crowd" class="panel">
  <div class="panel-title"><span class="dot green"></span>人流监测</div>
  <div class="stat-row"><span>运动场总人数</span><span class="stat-value" id="total-crowd">0</span></div>
  <div class="density-bar" id="total-density-bar" style="width:0%;background:#4ade80"></div>
  <div style="font-size:11px;color:#94a3b8;margin:4px 0 8px">密度等级: <span id="density-level" style="font-weight:700;color:#4ade80">低</span></div>
  <div class="zone-item"><div class="zone-name">足球场</div><div class="density-bar" id="bar-football" style="width:0%;background:#4ade80"></div></div>
  <div class="zone-item"><div class="zone-name">跑道</div><div class="density-bar" id="bar-track" style="width:0%;background:#4ade80"></div></div>
  <div class="zone-item"><div class="zone-name">篮球场</div><div class="density-bar" id="bar-basketball" style="width:0%;background:#4ade80"></div></div>
  <div class="zone-item"><div class="zone-name">健身区</div><div class="density-bar" id="bar-fitness" style="width:0%;background:#4ade80"></div></div>
  <div class="zone-item"><div class="zone-name">室内体育馆</div><div class="density-bar" id="bar-indoor" style="width:0%;background:#4ade80"></div></div>
</div>

<div id="panel-weather" class="panel">
  <div class="panel-title"><span class="dot yellow"></span>环境监测</div>
  <div class="weather-grid">
    <div class="weather-item"><div class="label">气温</div><div class="value" id="val-temp">28°C</div></div>
    <div class="weather-item"><div class="label">湿度</div><div class="value" id="val-humidity">55%</div></div>
    <div class="weather-item"><div class="label">风速</div><div class="value" id="val-wind">3m/s</div></div>
    <div class="weather-item"><div class="label">地表温度</div><div class="value" id="val-surface">32°C</div></div>
  </div>
  <div class="recommend"><div class="rec-title">今日运动推荐</div><div id="rec-text">加载中...</div></div>
</div>

<div id="panel-reserve" class="panel">
  <div class="panel-title"><span class="dot green"></span>场地预约</div>
  <div class="time-label"><span>16:00</span><span>17:00</span><span>18:00</span><span>19:00</span><span>20:00</span><span>21:00</span></div>
  <div id="venue-list"></div>
  <div class="reserve-action">
    <select id="duration-select"><option value="1">1小时</option><option value="2">2小时</option></select>
    <button class="btn-reserve" id="btn-reserve" disabled>确认预约</button>
    <span id="reserve-info" style="font-size:11px;color:#94a3b8"></span>
  </div>
</div>

<div id="legend">
  <span>热力图</span><span class="gradient"></span>
  <span style="color:#2563eb">低</span><span style="color:#ef4444">高</span>
</div>

<div id="tooltip"></div>

<script type="importmap">
{"imports":{
  "three":"https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ==================== StadiumAPIService ====================
class StadiumAPIService {
  constructor(useRealAPI = false) {
    this.useRealAPI = useRealAPI;
    this.baseURL = '/api/v1/stadium';
    this.cache = {};
  }

  async _fetchOrSimulate(endpoint, simulator) {
    if (!this.useRealAPI) return simulator();
    try {
      const res = await fetch(`${this.baseURL}${endpoint}`, { signal: AbortSignal.timeout(3000) });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return await res.json();
    } catch (e) {
      console.warn(`[API] ${endpoint} 请求失败，降级为模拟数据:`, e.message);
      return simulator();
    }
  }

  async fetchCrowdData() {
    return this._fetchOrSimulate('/crowd', () => simulateCrowdData());
  }

  async fetchWeatherData() {
    return this._fetchOrSimulate('/weather', () => simulateWeatherData());
  }

  async fetchReservations() {
    return this._fetchOrSimulate('/reservations', () => simulateReservations());
  }
}

// ==================== Data Simulation ====================
function simulateCrowdData() {
  const total = 80 + Math.floor(Math.random() * 71);
  const football = Math.floor(total * (0.15 + Math.random() * 0.15));
  const track = Math.floor(total * (0.2 + Math.random() * 0.15));
  const basketball = Math.floor(total * (0.1 + Math.random() * 0.1));
  const fitness = Math.floor(total * (0.08 + Math.random() * 0.08));
  const indoor = total - football - track - basketball - fitness;
  return { total, zones: { football, track, basketball, fitness, indoor }, timestamp: Date.now() };
}

function simulateWeatherData() {
  const temp = 22 + Math.floor(Math.random() * 20);
  const humidity = 30 + Math.floor(Math.random() * 51);
  const wind = 1 + Math.floor(Math.random() * 8);
  const solarRadiation = 200 + Math.floor(Math.random() * 600);
  const surfaceTemp = temp + (humidity * 0.05) + (wind * -0.3) + (solarRadiation * 0.015);
  return { temp, humidity, wind, solarRadiation, surfaceTemp: Math.round(surfaceTemp), timestamp: Date.now() };
}

function simulateReservations() {
  const venues = [];
  for (let i = 0; i < 6; i++) {
    const slots = [];
    for (let h = 16; h < 22; h++) {
      slots.push({ hour: h, booked: Math.random() < 0.35 });
    }
    venues.push({ id: i, name: `场地${String.fromCharCode(65 + i)}`, slots });
  }
  return { venues, timestamp: Date.now() };
}

// ==================== Sports Recommendation ====================
function getSportsRecommendation(temp, surfaceTemp) {
  if (surfaceTemp > 40) {
    return { level: 'danger', icon: '🔴', text: '⚠️ 地表温度超过40°C！请避免户外运动，建议选择室内场馆活动。穿着轻薄透气服装，注意防暑降温。', clothing: '轻薄透气运动服 + 防晒装备' };
  } else if (temp > 35) {
    return { level: 'hot', icon: '🟠', text: '高温天气，建议选择室内运动或清晨/傍晚进行户外运动。注意补充水分，穿着轻薄透气服装。', clothing: '轻薄透气运动服 + 遮阳帽' };
  } else if (temp >= 25) {
    return { level: 'warm', icon: '🟡', text: '天气温暖，适合各类户外运动。足球、篮球、跑步都是不错的选择。注意防晒和补水。', clothing: '短袖运动服 + 运动短裤' };
  } else if (temp >= 15) {
    return { level: 'mild', icon: '🟢', text: '舒适的户外运动天气。推荐跑步、足球、健身等中高强度运动，运动体验极佳。', clothing: '长袖或短袖运动服' };
  } else {
    return { level: 'cool', icon: '🔵', text: '天气偏凉，运动前充分热身非常重要。推荐室内运动或有氧运动，穿着保暖运动服。', clothing: '长袖保暖运动服 + 运动外套' };
  }
}

// ==================== Three.js Setup ====================
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x0a0a1a, 20, 60);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.5, 100);
camera.position.set(18, 14, 18);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 8;
controls.maxDistance = 35;
controls.maxPolarAngle = Math.PI / 2 + 0.3;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.3;
controls.update();

// Lighting
const ambientLight = new THREE.AmbientLight(0x334466, 2.5);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xffeedd, 6);
sunLight.position.set(20, 25, 10);
sunLight.castShadow = true;
sunLight.shadow.mapSize.width = 2048;
sunLight.shadow.mapSize.height = 2048;
sunLight.shadow.camera.near = 0.5;
sunLight.shadow.camera.far = 80;
sunLight.shadow.camera.left = -25;
sunLight.shadow.camera.right = 25;
sunLight.shadow.camera.top = 25;
sunLight.shadow.camera.bottom = -25;
sunLight.shadow.bias = -0.0001;
scene.add(sunLight);

const fillLight = new THREE.DirectionalLight(0x8899cc, 1.5);
fillLight.position.set(-10, 5, -5);
scene.add(fillLight);

// ==================== Ground ====================
const groundGeo = new THREE.PlaneGeometry(50, 40);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x2d3a1a, roughness: 0.9 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.05;
ground.receiveShadow = true;
scene.add(ground);

// Grid helper
const gridHelper = new THREE.PolarGridHelper(20, 32, 24, 128, 0x444444, 0x333333);
gridHelper.position.y = 0.01;
scene.add(gridHelper);

// ==================== Running Track ====================
function createRunningTrack() {
  const group = new THREE.Group();
  const outerShape = new THREE.Shape();
  const a = 9, b = 5.5;
  const segments = 64;
  for (let i = 0; i <= segments; i++) {
    const angle = (i / segments) * Math.PI * 2;
    const x = Math.cos(angle) * a;
    const z = Math.sin(angle) * b;
    if (i === 0) outerShape.moveTo(x, z);
    else outerShape.lineTo(x, z);
  }
  const innerHole = new THREE.Path();
  const ai = 7, bi = 4;
  for (let i = 0; i <= segments; i++) {
    const angle = (i / segments) * Math.PI * 2;
    const x = Math.cos(angle) * ai;
    const z = Math.sin(angle) * bi;
    if (i === 0) innerHole.moveTo(x, z);
    else innerHole.lineTo(x, z);
  }
  outerShape.holes.push(innerHole);

  const extrudeSettings = { depth: 0.08, bevelEnabled: true, bevelThickness: 0.02, bevelSize: 0.02, bevelSegments: 3 };
  const geo = new THREE.ExtrudeGeometry(outerShape, extrudeSettings);
  geo.rotateX(-Math.PI / 2);
  const mat = new THREE.MeshStandardMaterial({ color: 0xd4382e, roughness: 0.6, metalness: 0.05 });
  const track = new THREE.Mesh(geo, mat);
  track.position.y = 0.01;
  track.receiveShadow = true;
  track.castShadow = true;
  group.add(track);

  // Lane lines
  for (let lane = 0; lane < 4; lane++) {
    const r = 7.5 + lane * 0.35;
    const r2 = 4.25 + lane * 0.35;
    const pts = [];
    for (let i = 0; i <= 100; i++) {
      const angle = (i / 100) * Math.PI * 2;
      pts.push(new THREE.Vector3(Math.cos(angle) * r, 0.06, Math.sin(angle) * r2));
    }
    const lineGeo = new THREE.BufferGeometry().setFromPoints(pts);
    const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.3 });
    group.add(new THREE.Line(lineGeo, lineMat));
  }
  return group;
}
const trackGroup = createRunningTrack();
scene.add(trackGroup);

// ==================== Football Field ====================
const footballGeo = new THREE.PlaneGeometry(12, 7);
const footballMat = new THREE.MeshStandardMaterial({ color: 0x3d8c40, roughness: 0.7 });
const footballField = new THREE.Mesh(footballGeo, footballMat);
footballField.rotation.x = -Math.PI / 2;
footballField.position.y = 0.02;
footballField.receiveShadow = true;
scene.add(footballField);

// Football field markings
function addFootballMarkings() {
  const group = new THREE.Group();
  const mat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide });
  const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff });
  // Center circle
  const circleGeo = new THREE.RingGeometry(1.35, 1.4, 64);
  const circle = new THREE.Mesh(circleGeo, mat);
  circle.rotation.x = -Math.PI / 2;
  circle.position.y = 0.025;
  group.add(circle);
  // Center line
  const pts = [new THREE.Vector3(0, 0.025, 3.5), new THREE.Vector3(0, 0.025, -3.5)];
  group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), lineMat));
  return group;
}
scene.add(addFootballMarkings());

// ==================== Stands ====================
function createStands() {
  const group = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({ color: 0x6b7280, roughness: 0.8, metalness: 0.1 });
  for (let row = 0; row < 5; row++) {
    const w = 3, h = 0.4, d = 14;
    const geo = new THREE.BoxGeometry(w, h, d);
    const step = new THREE.Mesh(geo, mat);
    step.position.set(-9.5 - row * 1.6, 0.2 + row * 0.45, 0);
    step.castShadow = true;
    step.receiveShadow = true;
    group.add(step);
  }
  // Roof
  const roofGeo = new THREE.BoxGeometry(8, 0.15, 15);
  const roofMat = new THREE.MeshStandardMaterial({ color: 0x4a5568, roughness: 0.5, metalness: 0.2 });
  const roof = new THREE.Mesh(roofGeo, roofMat);
  roof.position.set(-13, 2.8, 0);
  roof.castShadow = true;
  group.add(roof);
  return group;
}
scene.add(createStands());

// ==================== Basketball Court ====================
function createBasketballCourt() {
  const group = new THREE.Group();
  const courtGeo = new THREE.PlaneGeometry(6, 10);
  const courtMat = new THREE.MeshStandardMaterial({ color: 0xe07b3c, roughness: 0.6 });
  const court = new THREE.Mesh(courtGeo, courtMat);
  court.rotation.x = -Math.PI / 2;
  court.position.set(11, 0.02, 0);
  court.receiveShadow = true;
  group.add(court);

  // Court lines
  const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff });
  const border = [
    new THREE.Vector3(8, 0.025, -5), new THREE.Vector3(8, 0.025, 5),
    new THREE.Vector3(14, 0.025, 5), new THREE.Vector3(14, 0.025, -5),
    new THREE.Vector3(8, 0.025, -5)
  ];
  group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(border), lineMat));
  const mid = [new THREE.Vector3(11, 0.025, -5), new THREE.Vector3(11, 0.025, 5)];
  group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(mid), lineMat));

  // Hoops
  for (let z of [-4.2, 4.2]) {
    const poleGeo = new THREE.CylinderGeometry(0.08, 0.08, 2.5, 8);
    const pole = new THREE.Mesh(poleGeo, new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.8 }));
    pole.position.set(8.5, 1.25, z);
    pole.castShadow = true;
    group.add(pole);
    const boardGeo = new THREE.BoxGeometry(0.15, 0.8, 1.2);
    const board = new THREE.Mesh(boardGeo, new THREE.MeshStandardMaterial({ color: 0xffffff }));
    board.position.set(8.4, 2.3, z);
    group.add(board);
  }
  return group;
}
scene.add(createBasketballCourt());

// ==================== Fitness Area ====================
function createFitnessArea() {
  const group = new THREE.Group();
  const areaGeo = new THREE.PlaneGeometry(7, 8);
  const areaMat = new THREE.MeshStandardMaterial({ color: 0x3b82f6, roughness: 0.6 });
  const area = new THREE.Mesh(areaGeo, areaMat);
  area.rotation.x = -Math.PI / 2;
  area.position.set(0, 0.02, -9);
  area.receiveShadow = true;
  group.add(area);

  // Equipment markers
  for (let i = 0; i < 6; i++) {
    const eqGeo = new THREE.BoxGeometry(0.8, 0.3, 0.8);
    const eq = new THREE.Mesh(eqGeo, new THREE.MeshStandardMaterial({ color: 0x60a5fa, roughness: 0.4, metalness: 0.3 }));
    eq.position.set((i % 3 - 1) * 2, 0.15, -9 + (Math.floor(i / 3) - 0.5) * 3);
    eq.castShadow = true;
    group.add(eq);
  }
  return group;
}
scene.add(createFitnessArea());

// ==================== Indoor Stadium ====================
function createIndoorStadium() {
  const group = new THREE.Group();
  // Walls
  const wallGeo = new THREE.BoxGeometry(12, 2, 10);
  const wallMat = new THREE.MeshStandardMaterial({ color: 0x8899aa, roughness: 0.5, metalness: 0.3, transparent: true, opacity: 0.5 });
  const walls = new THREE.Mesh(wallGeo, wallMat);
  walls.position.set(0, 1, 10);
  walls.castShadow = true;
  walls.receiveShadow = true;
  group.add(walls);

  // Semi-transparent roof
  const roofGeo = new THREE.BoxGeometry(12.5, 0.1, 10.5);
  const roofMat = new THREE.MeshStandardMaterial({ color: 0xaaccff, roughness: 0.2, metalness: 0.1, transparent: true, opacity: 0.35 });
  const roof = new THREE.Mesh(roofGeo, roofMat);
  roof.position.set(0, 2.05, 10);
  group.add(roof);

  // 6 courts inside (3x2 grid)
  for (let row = 0; row < 2; row++) {
    for (let col = 0; col < 3; col++) {
      const courtGeo = new THREE.PlaneGeometry(2.8, 2.8);
      const court = new THREE.Mesh(courtGeo, new THREE.MeshStandardMaterial({ color: 0xd4a574, roughness: 0.6 }));
      court.rotation.x = -Math.PI / 2;
      court.position.set((col - 1) * 3.2, 0.03, 10 + (row - 0.5) * 3.5);
      group.add(court);
    }
  }
  return group;
}
const indoorStadium = createIndoorStadium();
scene.add(indoorStadium);

const statusLights = [];
function createStatusLight(x, y, z, color) {
  const geo = new THREE.SphereGeometry(0.15, 16, 16);
  const mat = new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 1.5, roughness: 0.2 });
  const light = new THREE.Mesh(geo, mat);
  light.position.set(x, y, z);
  light.userData = { baseColor: color, phase: Math.random() * Math.PI * 2 };
  scene.add(light);
  statusLights.push(light);
  return light;
}

// ==================== Stick Figures ====================
const stickFigures = [];
const raycasterTargets = [];

function createStickFigure() {
  const group = new THREE.Group();
  const skinMat = new THREE.MeshStandardMaterial({ color: 0xffcc99, roughness: 0.6 });
  const darkMat = new THREE.MeshStandardMaterial({ color: 0x334455, roughness: 0.5 });
  const colors = [0xffcc99, 0xe8b88a, 0xf5d0a9, 0xd4a574, 0xc4956a];
  const mat = new THREE.MeshStandardMaterial({ color: colors[Math.floor(Math.random() * colors.length)], roughness: 0.6 });

  // Head
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), mat);
  head.position.y = 0.28;
  head.castShadow = true;
  group.add(head);

  // Body
  const body = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.05, 0.16, 8), darkMat);
  body.position.y = 0.15;
  body.castShadow = true;
  group.add(body);

  // Arms
  const armGeo = new THREE.CylinderGeometry(0.015, 0.015, 0.1, 6);
  const leftArm = new THREE.Mesh(armGeo, mat);
  leftArm.position.set(0.06, 0.22, 0);
  leftArm.rotation.z = 0.4 + Math.random() * 0.3;
  leftArm.castShadow = true;
  group.add(leftArm);
  const rightArm = new THREE.Mesh(armGeo, mat);
  rightArm.position.set(-0.06, 0.22, 0);
  rightArm.rotation.z = -0.4 - Math.random() * 0.3;
  rightArm.castShadow = true;
  group.add(rightArm);

  // Legs
  const legGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.12, 6);
  const leftLeg = new THREE.Mesh(legGeo, darkMat);
  leftLeg.position.set(0.025, 0.04, 0);
  leftLeg.castShadow = true;
  group.add(leftLeg);
  const rightLeg = new THREE.Mesh(legGeo, darkMat);
  rightLeg.position.set(-0.025, 0.04, 0);
  rightLeg.castShadow = true;
  group.add(rightLeg);

  group.userData = {
    floatPhase: Math.random() * Math.PI * 2,
    floatSpeed: 0.8 + Math.random() * 1.2,
    floatAmp: 0.02 + Math.random() * 0.04,
    baseY: 0,
    color: mat.color.getHex()
  };

  group.children.forEach(c => { c.userData = { parentGroup: group }; });
  raycasterTargets.push(...group.children);
  return group;
}

function distributeCrowd(count) {
  // Remove old figures
  stickFigures.forEach(f => scene.remove(f));
  stickFigures.length = 0;
  raycasterTargets.length = 0;

  const zones = [
    { name: 'football', cx: 0, cz: 0, rx: 5.5, rz: 3, weight: 0.22 },
    { name: 'track', cx: 0, cz: 0, rx: 8.5, rz: 5, rxInner: 7, rzInner: 4, weight: 0.28, ring: true },
    { name: 'basketball', cx: 11, cz: 0, rx: 2.5, rz: 4.5, weight: 0.15 },
    { name: 'fitness', cx: 0, cz: -9, rx: 3, rz: 3.5, weight: 0.12 },
    { name: 'indoor', cx: 0, cz: 10, rx: 5, rz: 4, weight: 0.23 },
  ];

  for (let i = 0; i < count; i++) {
    const zone = zones[Math.floor(Math.random() * zones.length)];
    let x, z;
    if (zone.ring) {
      const angle = Math.random() * Math.PI * 2;
      const r = zone.rxInner + Math.random() * (zone.rx - zone.rxInner);
      const rz2 = zone.rzInner + Math.random() * (zone.rz - zone.rzInner);
      x = zone.cx + Math.cos(angle) * r;
      z = zone.cz + Math.sin(angle) * rz2;
    } else {
      x = zone.cx + (Math.random() - 0.5) * zone.rx * 2;
      z = zone.cz + (Math.random() - 0.5) * zone.rz * 2;
    }
    const figure = createStickFigure();
    figure.position.set(x, 0.02, z);
    figure.userData.baseY = 0.02;
    figure.userData.zone = zone.name;
    scene.add(figure);
    stickFigures.push(figure);
  }
}

// ==================== Heatmap ====================
let heatmapMesh;
function createHeatmap() {
  const canvas = document.createElement('canvas');
  canvas.width = 512;
  canvas.height = 512;
  const tex = new THREE.CanvasTexture(canvas);
  tex.minFilter = THREE.LinearFilter;
  tex.magFilter = THREE.LinearFilter;

  const geo = new THREE.PlaneGeometry(30, 24);
  const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, opacity: 0.45, depthWrite: false });
  heatmapMesh = new THREE.Mesh(geo, mat);
  heatmapMesh.rotation.x = -Math.PI / 2;
  heatmapMesh.position.y = 0.04;
  scene.add(heatmapMesh);
  heatmapMesh._canvas = canvas;
  heatmapMesh._tex = tex;
}

function updateHeatmap(zoneData) {
  if (!heatmapMesh) return;
  const canvas = heatmapMesh._canvas;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 512, 512);

  const zoneMap = {
    football: { x: 256, y: 256, rx: 180, ry: 100 },
    track: { x: 256, y: 256, rx: 280, ry: 170 },
    basketball: { x: 420, y: 256, rx: 80, ry: 140 },
    fitness: { x: 256, y: 430, rx: 100, ry: 110 },
    indoor: { x: 256, y: 80, rx: 160, ry: 120 },
  };

  const maxDensity = 50;
  Object.entries(zoneData).forEach(([zone, count]) => {
    const pos = zoneMap[zone];
    if (!pos) return;
    const density = Math.min(count / maxDensity, 1);
    const gradient = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, Math.max(pos.rx, pos.ry));
    const r = Math.floor(30 + density * 225);
    const g = Math.floor(200 - density * 170);
    const b = Math.floor(255 - density * 200);
    const a = 0.15 + density * 0.7;
    gradient.addColorStop(0, `rgba(${r},${g},${b},${a})`);
    gradient.addColorStop(0.5, `rgba(${r},${g},${b},${a * 0.5})`);
    gradient.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, 512, 512);
  });
  heatmapMesh._tex.needsUpdate = true;
}

// ==================== Particles ====================
function createParticles() {
  const count = 200;
  const geo = new THREE.BufferGeometry();
  const positions = new Float32Array(count * 3);
  const colors = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    positions[i * 3] = (Math.random() - 0.5) * 30;
    positions[i * 3 + 1] = Math.random() * 8;
    positions[i * 3 + 2] = (Math.random() - 0.5) * 24;
    colors[i * 3] = 0.6 + Math.random() * 0.4;
    colors[i * 3 + 1] = 0.7 + Math.random() * 0.3;
    colors[i * 3 + 2] = 0.8 + Math.random() * 0.2;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  const mat = new THREE.PointsMaterial({ size: 0.04, vertexColors: true, transparent: true, opacity: 0.6, depthWrite: false, blending: THREE.AdditiveBlending });
  const particles = new THREE.Points(geo, mat);
  particles.name = 'particles';
  scene.add(particles);
  return particles;
}
const particles = createParticles();

// ==================== Raycaster for Hover ====================
const raycaster = new THREE.Raycaster();
raycaster.far = 20;
const mouse = new THREE.Vector2();
let hoveredFigure = null;
const tooltip = document.getElementById('tooltip');

function onMouseMove(e) {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(raycasterTargets, false);

  if (hoveredFigure) {
    hoveredFigure.children.forEach(c => {
      if (c.material && c.material.emissive) c.material.emissive.set(0x000000);
    });
    hoveredFigure = null;
    tooltip.style.opacity = '0';
  }

  if (intersects.length > 0) {
    const obj = intersects[0].object;
    if (obj.userData.parentGroup) {
      const fig = obj.userData.parentGroup;
      if (fig !== hoveredFigure) {
        hoveredFigure = fig;
        fig.children.forEach(c => {
          if (c.material && c.material.emissive) {
            c.material.emissive = new THREE.Color(0x444444);
            c.material.emissiveIntensity = 0.5;
          }
        });
        const zoneNames = { football: '足球场', track: '跑道', basketball: '篮球场', fitness: '健身区', indoor: '室内体育馆' };
        tooltip.textContent = `位置: ${zoneNames[fig.userData.zone] || '未知区域'}`;
        tooltip.style.left = (e.clientX + 15) + 'px';
        tooltip.style.top = (e.clientY - 30) + 'px';
        tooltip.style.opacity = '1';
      }
    }
  }
}
window.addEventListener('mousemove', onMouseMove, { passive: true });

// ==================== UI State ====================
let crowdData = { total: 0, zones: { football: 0, track: 0, basketball: 0, fitness: 0, indoor: 0 } };
let weatherData = { temp: 28, humidity: 55, wind: 3, surfaceTemp: 32 };
let reservationData = { venues: [] };
let selectedVenue = null;
let selectedHour = null;

function getDensityColor(ratio) {
  if (ratio < 0.3) return '#4ade80';
  if (ratio < 0.6) return '#facc15';
  return '#ef4444';
}

function getDensityLevel(ratio) {
  if (ratio < 0.3) return '低';
  if (ratio < 0.6) return '中';
  return '高';
}

function updateCrowdPanel(data) {
  crowdData = data;
  document.getElementById('total-crowd').textContent = data.total;
  const maxCrowd = 150;
  const ratio = data.total / maxCrowd;
  const totalBar = document.getElementById('total-density-bar');
  totalBar.style.width = (ratio * 100) + '%';
  totalBar.style.background = getDensityColor(ratio);
  const levelEl = document.getElementById('density-level');
  levelEl.textContent = getDensityLevel(ratio);
  levelEl.style.color = getDensityColor(ratio);

  const zoneMax = { football: 35, track: 45, basketball: 25, fitness: 20, indoor: 35 };
  Object.entries(data.zones).forEach(([zone, count]) => {
    const bar = document.getElementById('bar-' + zone);
    if (bar) {
      const r = count / zoneMax[zone];
      bar.style.width = (r * 100) + '%';
      bar.style.background = getDensityColor(r);
    }
  });
}

function updateWeatherPanel(data) {
  weatherData = data;
  document.getElementById('val-temp').textContent = data.temp + '°C';
  document.getElementById('val-humidity').textContent = data.humidity + '%';
  document.getElementById('val-wind').textContent = data.wind + 'm/s';
  const surfaceEl = document.getElementById('val-surface');
  surfaceEl.textContent = data.surfaceTemp + '°C';
  if (data.surfaceTemp > 40) {
    surfaceEl.classList.add('warning');
  } else {
    surfaceEl.classList.remove('warning');
  }
  const rec = getSportsRecommendation(data.temp, data.surfaceTemp);
  document.getElementById('rec-text').innerHTML = `${rec.icon} ${rec.text}<br><span style="color:#94a3b8;font-size:11px">建议着装: ${rec.clothing}</span>`;
}

function updateReservationPanel(data) {
  reservationData = data;
  const list = document.getElementById('venue-list');
  let html = '';
  data.venues.forEach((venue, idx) => {
    html += `<div class="venue-row"><span class="venue-name">${venue.name}</span><div class="timeline">`;
    venue.slots.forEach((slot, si) => {
      let cls = slot.booked ? 'booked' : 'available';
      if (selectedVenue === idx && selectedHour === slot.hour) cls += ' selected';
      html += `<div class="time-slot ${cls}" data-venue="${idx}" data-hour="${slot.hour}">${slot.hour}</div>`;
    });
    html += `</div></div>`;
  });
  list.innerHTML = html;

  // Click handlers
  list.querySelectorAll('.time-slot.available').forEach(el => {
    el.addEventListener('click', () => {
      selectedVenue = parseInt(el.dataset.venue);
      selectedHour = parseInt(el.dataset.hour);
      updateReservationPanel(reservationData);
      updateReserveButton();
    });
  });
  list.querySelectorAll('.time-slot.booked').forEach(el => {
    el.addEventListener('click', () => {
      selectedVenue = null;
      selectedHour = null;
      updateReservationPanel(reservationData);
      updateReserveButton();
    });
  });
}

function updateReserveButton() {
  const btn = document.getElementById('btn-reserve');
  const info = document.getElementById('reserve-info');
  if (selectedVenue !== null && selectedHour !== null) {
    btn.disabled = false;
    const venue = reservationData.venues[selectedVenue];
    info.textContent = `已选: ${venue.name} ${selectedHour}:00`;
  } else {
    btn.disabled = true;
    info.textContent = '';
  }
}

document.getElementById('btn-reserve').addEventListener('click', () => {
  if (selectedVenue === null || selectedHour === null) return;
  const duration = parseInt(document.getElementById('duration-select').value);
  const venue = reservationData.venues[selectedVenue];
  venue.slots.forEach(s => {
    if (s.hour >= selectedHour && s.hour < selectedHour + duration) s.booked = true;
  });
  selectedVenue = null;
  selectedHour = null;
  updateReservationPanel(reservationData);
  updateReserveButton();
  // Flash effect
  const btn = document.getElementById('btn-reserve');
  btn.textContent = '已预约!';
  btn.style.background = 'linear-gradient(135deg,#22c55e,#16a34a)';
  setTimeout(() => {
    btn.textContent = '确认预约';
    btn.style.background = 'linear-gradient(135deg,#3b82f6,#6366f1)';
    btn.disabled = true;
  }, 1500);
});

// ==================== API Service ====================
const api = new StadiumAPIService(false);

// ==================== Data Refresh ====================
async function refreshData() {
  const [crowd, weather, reservations] = await Promise.all([
    api.fetchCrowdData(),
    api.fetchWeatherData(),
    api.fetchReservations()
  ]);

  updateCrowdPanel(crowd);
  updateWeatherPanel(weather);
  updateReservationPanel(reservations);
  updateReserveButton();

  // Update status lights based on crowd
  const zoneList = ['football', 'track', 'basketball', 'fitness', 'indoor'];
  const maxPerZone = { football: 35, track: 45, basketball: 25, fitness: 20, indoor: 35 };
  statusLights.forEach((light, i) => {
    const zone = zoneList[i] || 'football';
    const count = crowd.zones[zone] || 0;
    const ratio = count / (maxPerZone[zone] || 30);
    let color;
    if (ratio > 0.7) color = new THREE.Color(0xef4444);
    else if (ratio > 0.4) color = new THREE.Color(0xfacc15);
    else color = new THREE.Color(0x4ade80);
    light.material.color.set(color);
    light.material.emissive.set(color);
  });

  // Update heatmap
  updateHeatmap(crowd.zones);
}

// ==================== Animation Loop ====================
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  controls.update();

  // Animate stick figures
  stickFigures.forEach(fig => {
    const ud = fig.userData;
    fig.position.y = ud.baseY + Math.sin(t * ud.floatSpeed + ud.floatPhase) * ud.floatAmp;
  });

  // Animate particles
  if (particles) {
    const pos = particles.geometry.attributes.position.array;
    for (let i = 0; i < pos.length / 3; i++) {
      pos[i * 3 + 1] += 0.003;
      if (pos[i * 3 + 1] > 8) pos[i * 3 + 1] = 0;
    }
    particles.geometry.attributes.position.needsUpdate = true;
    particles.rotation.y += 0.0005;
  }

  // Animate status lights
  statusLights.forEach(light => {
    const intensity = 0.8 + Math.sin(t * 3 + light.userData.phase) * 0.4;
    light.material.emissiveIntensity = intensity;
  });

  renderer.render(scene, camera);
}

// ==================== Resize ====================
function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}
window.addEventListener('resize', onResize);

// ==================== Init ====================
distributeCrowd(115);
createHeatmap();
refreshData();
animate();

// Periodic data refresh
setInterval(refreshData, 8000);

// Periodic crowd redistribution (smooth population changes)
setInterval(() => {
  const newCount = 80 + Math.floor(Math.random() * 71);
  // Smooth transition: adjust existing count toward target
  const currentCount = stickFigures.length;
  const diff = newCount - currentCount;
  if (diff > 0) {
    for (let i = 0; i < Math.min(diff, 5); i++) {
      const zones = ['football', 'track', 'basketball', 'fitness', 'indoor'];
      const zone = zones[Math.floor(Math.random() * zones.length)];
      const zoneCenters = { football: [0, 0, 5.5, 3], track: [0, 0, 8.5, 5], basketball: [11, 0, 2.5, 4.5], fitness: [0, -9, 3, 3.5], indoor: [0, 10, 5, 4] };
      const [cx, cz, rx, rz] = zoneCenters[zone];
      const fig = createStickFigure();
      fig.position.set(cx + (Math.random() - 0.5) * rx * 2, 0.02, cz + (Math.random() - 0.5) * rz * 2);
      fig.userData.baseY = 0.02;
      fig.userData.zone = zone;
      scene.add(fig);
      stickFigures.push(fig);
    }
  } else if (diff < 0) {
    for (let i = 0; i < Math.min(-diff, 5); i++) {
      if (stickFigures.length === 0) break;
      const idx = Math.floor(Math.random() * stickFigures.length);
      const fig = stickFigures[idx];
      scene.remove(fig);
      const targetIdx = raycasterTargets.findIndex(t => t.userData.parentGroup === fig);
      if (targetIdx >= 0) raycasterTargets.splice(targetIdx, fig.children.length);
      stickFigures.splice(idx, 1);
    }
  }
}, 5000);
