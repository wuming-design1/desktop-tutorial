<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STADIUM CTRL // 运动场人流监测</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg: #050510;
  --cyan: #00f0ff;
  --magenta: #ff2d78;
  --amber: #ffb700;
  --lime: #00ff87;
  --panel-bg: rgba(4,6,18,0.72);
  --border: rgba(0,240,255,0.2);
  --text: #c8d6e5;
  --muted: #5a6a8a;
  --font-display: 'Orbitron', 'Noto Sans SC', sans-serif;
  --font-mono: 'Share Tech Mono', monospace;
  --font-body: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  overflow:hidden;background:var(--bg);
  font-family:var(--font-body);color:var(--text);
  -webkit-font-smoothing:antialiased;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(0,240,255,0.02) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,240,255,0.02) 1px,transparent 1px);
  background-size:32px 32px;
}
body::after{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);
  opacity:0.4;
}
#canvas-container{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1}
canvas{display:block}

.panel{
  position:fixed;z-index:10;color:var(--text);
  background:var(--panel-bg);
  backdrop-filter:blur(24px) saturate(140%);
  -webkit-backdrop-filter:blur(24px) saturate(140%);
  border:1px solid var(--border);
  padding:20px 22px;
  pointer-events:auto;
  clip-path:polygon(
    0 10px, 10px 0, calc(100% - 10px) 0, 100% 10px,
    100% calc(100% - 10px), calc(100% - 10px) 100%, 10px 100%, 0 calc(100% - 10px)
  );
  transition:border-color 0.4s, background 0.4s;
}
.panel::before{
  content:'';position:absolute;inset:0;z-index:-1;opacity:0;transition:opacity 0.4s;
  background:radial-gradient(ellipse at top left,var(--cyan),transparent 60%),
             radial-gradient(ellipse at bottom right,var(--magenta),transparent 60%);
}
.panel:hover{background:rgba(4,6,18,0.85);border-color:rgba(0,240,255,0.45)}
.panel:hover::before{opacity:0.06}

.panel-title{
  font-family:var(--font-display);font-size:11px;font-weight:700;
  letter-spacing:0.15em;text-transform:uppercase;margin-bottom:14px;
  display:flex;align-items:center;gap:10px;
  padding-bottom:12px;border-bottom:1px solid rgba(0,240,255,0.15);
  color:var(--cyan);
}
.panel-title .dot{width:7px;height:7px;display:inline-block;position:relative}
.panel-title .dot::after{
  content:'';position:absolute;inset:-3px;border-radius:50%;
  animation:glowPulse 2s ease-in-out infinite;
}
.dot.green{background:var(--lime)} .dot.green::after{background:var(--lime);opacity:0.4}
.dot.yellow{background:var(--amber)} .dot.yellow::after{background:var(--amber);opacity:0.4}
.dot.red{background:var(--magenta)} .dot.red::after{background:var(--magenta);opacity:0.4}
.dot.gray{background:var(--muted)} .dot.gray::after{background:var(--muted);opacity:0.2}
.dot.cyan{background:var(--cyan)} .dot.cyan::after{background:var(--cyan);opacity:0.4}
@keyframes glowPulse{0%,100%{transform:scale(1);opacity:0.4}50%{transform:scale(1.8);opacity:0}}

#panel-crowd{top:22px;left:22px;width:320px;max-height:calc(100vh - 44px);overflow-y:auto}
#panel-crowd .stat-row{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0}
#panel-crowd .stat-label{font-size:12px;color:var(--muted);font-family:var(--font-body)}
#panel-crowd .stat-value{font-family:var(--font-mono);font-size:28px;font-weight:400;color:var(--cyan);text-shadow:0 0 12px rgba(0,240,255,0.4);font-variant-numeric:tabular-nums;letter-spacing:0.05em}
#panel-crowd .density-bar-wrap{height:4px;background:rgba(255,255,255,0.06);margin:4px 0 2px;position:relative;overflow:hidden}
#panel-crowd .density-bar{height:100%;transition:width 0.6s cubic-bezier(0.22,1,0.36,1);position:relative}
#panel-crowd .density-bar::after{content:'';position:absolute;right:0;top:0;bottom:0;width:20px;background:linear-gradient(to right,transparent,currentColor);opacity:0.5}
#panel-crowd .density-level{font-family:var(--font-mono);font-size:10px;margin:4px 0 10px;letter-spacing:0.08em;text-transform:uppercase}
#panel-crowd .zone-item{margin-bottom:10px}
#panel-crowd .zone-name{font-size:11px;color:var(--muted);margin-bottom:3px;display:flex;justify-content:space-between}
#panel-crowd .zone-name span:last-child{font-family:var(--font-mono);color:var(--text)}

#panel-weather{top:22px;right:22px;width:290px}
#panel-weather .weather-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
#panel-weather .weather-item{background:rgba(0,240,255,0.03);border:1px solid rgba(0,240,255,0.08);padding:12px 10px;text-align:center;clip-path:polygon(0 4px,4px 0,calc(100% - 4px) 0,100% 4px,100% calc(100% - 4px),calc(100% - 4px) 100%,4px 100%,0 calc(100% - 4px));transition:border-color 0.3s,background 0.3s}
#panel-weather .weather-item:hover{background:rgba(0,240,255,0.06);border-color:rgba(0,240,255,0.2)}
#panel-weather .weather-item .label{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px;font-family:var(--font-display)}
#panel-weather .weather-item .value{font-family:var(--font-mono);font-size:18px;font-weight:400;color:var(--amber)}
#panel-weather .warning{color:var(--magenta)!important;animation:warningBlink 1s ease-in-out infinite;text-shadow:0 0 10px rgba(255,45,120,0.6)}
@keyframes warningBlink{0%,100%{opacity:1}50%{opacity:0.5}}
#panel-weather .recommend{margin-top:10px;padding:12px;font-size:11px;line-height:1.7;border:1px solid rgba(0,240,255,0.1);background:rgba(0,240,255,0.02);clip-path:polygon(0 4px,4px 0,calc(100% - 4px) 0,100% 4px,100% calc(100% - 4px),calc(100% - 4px) 100%,4px 100%,0 calc(100% - 4px))}
#panel-weather .recommend .rec-title{font-family:var(--font-display);font-size:10px;color:var(--cyan);letter-spacing:0.12em;margin-bottom:6px;text-transform:uppercase}

#panel-reserve{bottom:22px;right:22px;width:360px;max-height:360px;overflow-y:auto}
#panel-reserve .venue-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid rgba(0,240,255,0.06)}
#panel-reserve .venue-name{width:42px;font-family:var(--font-mono);font-size:11px;color:var(--cyan);flex-shrink:0;letter-spacing:0.05em}
#panel-reserve .timeline{display:flex;gap:3px;flex:1}
#panel-reserve .time-slot{width:32px;height:24px;cursor:pointer;font-family:var(--font-mono);font-size:10px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;background:rgba(255,255,255,0.04);color:var(--muted);clip-path:polygon(0 3px,3px 0,calc(100% - 3px) 0,100% 3px,100% calc(100% - 3px),calc(100% - 3px) 100%,3px 100%,0 calc(100% - 3px))}
#panel-reserve .time-slot.available{background:rgba(0,255,135,0.1);color:var(--lime);border:1px solid rgba(0,255,135,0.2)}
#panel-reserve .time-slot.available:hover{background:rgba(0,255,135,0.22);transform:scale(1.12);box-shadow:0 0 10px rgba(0,255,135,0.25)}
#panel-reserve .time-slot.booked{background:rgba(255,45,120,0.08);color:var(--magenta);border:1px solid rgba(255,45,120,0.15);cursor:not-allowed}
#panel-reserve .time-slot.selected{background:rgba(0,240,255,0.18);color:var(--cyan);border:1px solid rgba(0,240,255,0.4);box-shadow:0 0 12px rgba(0,240,255,0.3),inset 0 0 8px rgba(0,240,255,0.1)}
#panel-reserve .time-label{display:flex;justify-content:space-between;padding:0 52px 6px;font-family:var(--font-mono);font-size:9px;color:var(--muted);letter-spacing:0.05em}
#panel-reserve .reserve-action{margin-top:12px;display:flex;gap:8px;align-items:center}
#panel-reserve .reserve-action select{background:rgba(0,0,0,0.5);color:var(--text);border:1px solid var(--border);padding:8px 12px;font-size:12px;font-family:var(--font-mono);outline:none;cursor:pointer;clip-path:polygon(0 4px,4px 0,calc(100% - 4px) 0,100% 4px,100% calc(100% - 4px),calc(100% - 4px) 100%,4px 100%,0 calc(100% - 4px))}
#panel-reserve .reserve-action select option{background:#0a0a1e;color:var(--text)}
#panel-reserve .btn-reserve{background:transparent;color:var(--cyan);border:1px solid rgba(0,240,255,0.4);padding:8px 18px;font-family:var(--font-display);font-size:10px;font-weight:700;letter-spacing:0.1em;cursor:pointer;transition:all 0.25s;clip-path:polygon(0 4px,4px 0,calc(100% - 4px) 0,100% 4px,100% calc(100% - 4px),calc(100% - 4px) 100%,4px 100%,0 calc(100% - 4px))}
#panel-reserve .btn-reserve:hover:not(:disabled){background:rgba(0,240,255,0.12);box-shadow:0 0 16px rgba(0,240,255,0.3),inset 0 0 12px rgba(0,240,255,0.08);transform:translateY(-1px)}
#panel-reserve .btn-reserve:disabled{opacity:0.3;cursor:not-allowed}

/* ── API Config Panel ── */
#panel-api{bottom:22px;left:22px;width:300px;max-height:280px;z-index:11}
#panel-api .api-status{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-family:var(--font-mono);font-size:10px}
#panel-api .api-status-indicator{width:6px;height:6px;border-radius:50%}
#panel-api .api-status-indicator.on{background:var(--lime);box-shadow:0 0 6px var(--lime)}
#panel-api .api-status-indicator.off{background:var(--magenta);box-shadow:0 0 6px var(--magenta)}
#panel-api .api-field{margin-bottom:8px}
#panel-api .api-field label{display:block;font-size:10px;color:var(--muted);margin-bottom:3px;font-family:var(--font-display);letter-spacing:0.08em;text-transform:uppercase}
#panel-api .api-field input{width:100%;background:rgba(0,0,0,0.5);color:var(--text);border:1px solid var(--border);padding:7px 10px;font-family:var(--font-mono);font-size:11px;outline:none;transition:border-color 0.3s;clip-path:polygon(0 3px,3px 0,calc(100% - 3px) 0,100% 3px,100% calc(100% - 3px),calc(100% - 3px) 100%,3px 100%,0 calc(100% - 3px))}
#panel-api .api-field input:focus{border-color:var(--cyan)}
#panel-api .api-field input:disabled{opacity:0.3;cursor:not-allowed}
#panel-api .api-field input::placeholder{color:var(--muted);opacity:0.5}
#panel-api .api-toggle{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:10px;font-size:11px;font-family:var(--font-display);letter-spacing:0.08em}
#panel-api .api-toggle-label{color:var(--muted);cursor:pointer;transition:color 0.3s;user-select:none}
#panel-api .api-toggle-label.active{color:var(--cyan);text-shadow:0 0 8px rgba(0,240,255,0.4)}
#panel-api .api-toggle-switch{position:relative;width:44px;height:24px;background:rgba(255,255,255,0.06);border-radius:12px;cursor:pointer;transition:all 0.3s;border:1px solid var(--border);flex-shrink:0}
#panel-api .api-toggle-switch.on{background:rgba(0,240,255,0.2);border-color:rgba(0,240,255,0.5);box-shadow:0 0 12px rgba(0,240,255,0.2)}
#panel-api .api-toggle-switch::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:var(--muted);transition:all 0.3s}
#panel-api .api-toggle-switch.on::after{left:22px;background:var(--cyan);box-shadow:0 0 8px var(--cyan)}
#panel-api .btn-test{background:transparent;color:var(--cyan);border:1px solid rgba(0,240,255,0.3);padding:5px 14px;font-family:var(--font-display);font-size:9px;font-weight:700;letter-spacing:0.1em;cursor:pointer;transition:all 0.25s;clip-path:polygon(0 3px,3px 0,calc(100% - 3px) 0,100% 3px,100% calc(100% - 3px),calc(100% - 3px) 100%,3px 100%,0 calc(100% - 3px))}
#panel-api .btn-test:hover{background:rgba(0,240,255,0.1);box-shadow:0 0 10px rgba(0,240,255,0.2)}
#panel-api .api-msg{font-size:10px;font-family:var(--font-mono);margin-top:6px;min-height:14px}
#panel-api .api-msg.success{color:var(--lime)} #panel-api .api-msg.error{color:var(--magenta)}

#legend{position:fixed;bottom:22px;left:340px;z-index:10;display:flex;align-items:center;gap:8px;background:var(--panel-bg);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid var(--border);padding:10px 14px;font-size:10px;color:var(--muted);font-family:var(--font-display);letter-spacing:0.08em;clip-path:polygon(0 4px,4px 0,calc(100% - 4px) 0,100% 4px,100% calc(100% - 4px),calc(100% - 4px) 100%,4px 100%,0 calc(100% - 4px))}
#legend .gradient{width:100px;height:6px;background:linear-gradient(to right,#0066ff,#00e5ff,#00ff87,#ffb700,#ff2d78)}
#legend .gradient+span{color:#0066ff}#legend span:last-child{color:#ff2d78}

#tooltip{position:fixed;z-index:20;pointer-events:none;opacity:0;transition:opacity 0.15s;background:rgba(4,6,18,0.95);color:var(--cyan);padding:8px 14px;font-size:11px;font-family:var(--font-mono);border:1px solid rgba(0,240,255,0.3);box-shadow:0 0 16px rgba(0,240,255,0.15);white-space:nowrap;clip-path:polygon(0 3px,3px 0,calc(100% - 3px) 0,100% 3px,100% calc(100% - 3px),calc(100% - 3px) 100%,3px 100%,0 calc(100% - 3px))}

#accent-line{position:fixed;top:0;right:338px;width:1px;height:100vh;z-index:5;pointer-events:none;background:linear-gradient(to bottom,transparent,rgba(0,240,255,0.15) 20%,rgba(0,240,255,0.15) 80%,transparent)}
#accent-dot{position:fixed;top:50%;right:336px;z-index:5;pointer-events:none;width:5px;height:5px;background:var(--cyan);box-shadow:0 0 8px var(--cyan),0 0 20px var(--cyan);animation:accentFloat 3s ease-in-out infinite}
@keyframes accentFloat{0%,100%{transform:translateY(-50%)}50%{transform:translateY(calc(-50% - 10px))}}

@media(max-width:768px){
  #accent-line,#accent-dot{display:none}
  #panel-crowd{width:calc(100vw - 20px);top:10px;left:10px;padding:14px}
  #panel-weather{width:calc(100vw - 20px);top:auto;bottom:380px;right:10px;padding:14px}
  #panel-reserve{width:calc(100vw - 20px);bottom:10px;right:10px;padding:14px;max-height:280px}
  #panel-api{width:calc(100vw - 20px);bottom:auto;top:10px;left:10px;padding:14px;max-height:200px}
  #legend{bottom:auto;top:10px;right:10px;left:auto;padding:8px 10px}
}
</style>
</head>
<body>

<div id="canvas-container"><div id="webgl-fallback" style="display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;font-family:var(--font-display);color:var(--cyan);z-index:2"><div style="font-size:48px;margin-bottom:16px;opacity:0.3">◈</div><div style="font-size:14px;letter-spacing:0.1em;margin-bottom:8px">WEBGL UNAVAILABLE</div><div style="font-size:10px;color:var(--muted)">请在支持 WebGL 的浏览器中打开以查看 3D 场景</div></div></div>

<div id="accent-line"></div>
<div id="accent-dot"></div>

<div id="panel-crowd" class="panel">
  <div class="panel-title"><span class="dot green"></span>CROWD MONITOR</div>
  <div class="stat-row"><span class="stat-label">运动场总人数</span><span class="stat-value" id="total-crowd">0</span></div>
  <div class="density-bar-wrap"><div class="density-bar" id="total-density-bar" style="width:0%"></div></div>
  <div class="density-level">密度等级 // <span id="density-level" style="color:var(--lime)">LOW</span></div>
  <div class="zone-item"><div class="zone-name"><span>足球场</span><span>--</span></div><div class="density-bar-wrap"><div class="density-bar" id="bar-football" style="width:0%"></div></div></div>
  <div class="zone-item"><div class="zone-name"><span>跑道</span><span>--</span></div><div class="density-bar-wrap"><div class="density-bar" id="bar-track" style="width:0%"></div></div></div>
  <div class="zone-item"><div class="zone-name"><span>篮球场</span><span>--</span></div><div class="density-bar-wrap"><div class="density-bar" id="bar-basketball" style="width:0%"></div></div></div>
  <div class="zone-item"><div class="zone-name"><span>健身区</span><span>--</span></div><div class="density-bar-wrap"><div class="density-bar" id="bar-fitness" style="width:0%"></div></div></div>
  <div class="zone-item"><div class="zone-name"><span>室内体育馆</span><span>--</span></div><div class="density-bar-wrap"><div class="density-bar" id="bar-indoor" style="width:0%"></div></div></div>
</div>

<div id="panel-weather" class="panel">
  <div class="panel-title"><span class="dot yellow"></span>ENVIROMENT // 重庆</div>
  <div class="weather-grid">
    <div class="weather-item"><div class="label">TEMP</div><div class="value" id="val-temp">28°C</div></div>
    <div class="weather-item"><div class="label">HUMIDITY</div><div class="value" id="val-humidity">55%</div></div>
    <div class="weather-item"><div class="label">WIND</div><div class="value" id="val-wind">3m/s</div></div>
    <div class="weather-item"><div class="label">SURFACE</div><div class="value" id="val-surface">32°C</div></div>
  </div>
  <div class="recommend"><div class="rec-title">RECOMMENDATION</div><div id="rec-text">加载中...</div></div>
</div>

<div id="panel-reserve" class="panel">
  <div class="panel-title"><span class="dot green"></span>VENUE BOOKING</div>
  <div class="time-label"><span>16:00</span><span>17:00</span><span>18:00</span><span>19:00</span><span>20:00</span><span>21:00</span></div>
  <div id="venue-list"></div>
  <div class="reserve-action">
    <select id="duration-select"><option value="1">1小时</option><option value="2">2小时</option></select>
    <button class="btn-reserve" id="btn-reserve" disabled>确认预约</button>
    <span id="reserve-info" style="font-size:11px;color:var(--muted)"></span>
  </div>
</div>

<div id="panel-api" class="panel">
  <div class="panel-title"><span class="dot cyan"></span>API CONFIG</div>
  <div class="api-status">
    <div id="api-status-indicator" class="api-status-indicator on"></div>
    <span id="api-status-text" style="color:var(--lime)">真实 API 模式</span>
  </div>
  <div class="api-toggle" id="api-toggle-wrapper">
    <span class="api-toggle-label" data-mode="mock">模拟数据</span>
    <div id="api-toggle-switch" class="api-toggle-switch on"></div>
    <span class="api-toggle-label active" data-mode="real">真实 API</span>
  </div>
  <div class="api-field">
    <label>人流 API</label>
    <input type="text" id="api-crowd" placeholder="/api/v1/crowd">
  </div>
  <div class="api-field">
    <label>预约数据 API</label>
    <input type="text" id="api-reservations" placeholder="/api/v1/reservations">
  </div>
  <div class="api-field">
    <label>预约提交 API (POST)</label>
    <input type="text" id="api-book" placeholder="/api/v1/book">
  </div>
  <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:10px">
    <button class="btn-test" id="btn-api-test">TEST & REFRESH</button>
    <span style="flex:1" class="api-msg" id="api-msg"></span>
  </div>
</div>

<div id="legend">
  <span>HEATMAP</span><span class="gradient"></span>
  <span>LOW</span><span style="color:var(--muted);margin:0 2px">/</span><span>HIGH</span>
</div>

<div id="tooltip"></div>

<script type="importmap">
{"imports":{
  "three":"https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ==================== StadiumAPIService ====================
class StadiumAPIService {
  constructor(useRealAPI = false, config = {}) {
    this.useRealAPI = useRealAPI;
    this.config = {
      crowdUrl: config.crowdUrl || '',
      reservationsUrl: config.reservationsUrl || '',
      bookUrl: config.bookUrl || ''
    };
    this.baseURL = '/api/v1/stadium';
    this.cache = {};
  }

  setConfig(newConfig) {
    Object.assign(this.config, newConfig);
  }

  setUseRealAPI(enabled) {
    this.useRealAPI = enabled;
  }

  async _fetchOrSimulate(customUrl, defaultEndpoint, simulator) {
    if (!this.useRealAPI) return simulator();
    const url = customUrl || `${this.baseURL}${defaultEndpoint}`;
    if (!url) {
      console.warn(`[API] 未配置${defaultEndpoint}地址，降级为模拟数据`);
      return simulator();
    }
    try {
      const res = await fetch(url, { signal: AbortSignal.timeout(5000) });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return await res.json();
    } catch (e) {
      console.warn(`[API] ${url} 请求失败，降级为模拟数据:`, e.message);
      return simulator();
    }
  }

  async fetchCrowdData() {
    return this._fetchOrSimulate(this.config.crowdUrl, '/crowd', () => simulateCrowdData());
  }

  async fetchWeatherData() {
    // Weather always uses Open-Meteo public API for Chongqing
    if (!this.useRealAPI) return simulateWeatherData();
    try {
      const url = 'https://api.open-meteo.com/v1/forecast?latitude=29.43&longitude=106.91&current=temperature_2m,relative_humidity_2m,wind_speed_10m&hourly=shortwave_radiation&timezone=Asia/Shanghai&forecast_hours=1';
      const res = await fetch(url, { signal: AbortSignal.timeout(5000) });
      if (!res.ok) throw new Error(`Open-Meteo API ${res.status}`);
      const data = await res.json();
      const temp = Math.round(data.current.temperature_2m);
      const humidity = data.current.relative_humidity_2m;
      const windKmh = data.current.wind_speed_10m;
      const wind = Math.round(windKmh / 3.6 * 10) / 10;
      const solarRadiation = data.hourly.shortwave_radiation[0] || 300;
      const surfaceTemp = temp + (humidity * 0.05) + (wind * -0.3) + (solarRadiation * 0.015);
      const result = { temp, humidity, wind, solarRadiation, surfaceTemp: Math.round(surfaceTemp), timestamp: Date.now() };
      console.log('[API] 已获取重庆实时天气数据:', result);
      return result;
    } catch (e) {
      console.warn(`[API] Open-Meteo 请求失败，降级为模拟数据:`, e.message);
      return simulateWeatherData();
    }
  }

  async fetchReservations() {
    return this._fetchOrSimulate(this.config.reservationsUrl, '/reservations', () => simulateReservations());
  }

  async bookReservation(booking) {
    /* booking: { venueId, venueName, hour, duration, timestamp } */
    if (!this.useRealAPI || !this.config.bookUrl) {
      console.warn('[API] 未配置预约API，仅本地更新');
      return { success: true };
    }
    try {
      const res = await fetch(this.config.bookUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(booking),
        signal: AbortSignal.timeout(5000)
      });
      if (!res.ok) throw new Error(`POST ${res.status}`);
      const data = await res.json();
      console.log('[API] 预约提交成功:', data);
      return { success: true, data };
    } catch (e) {
      console.error('[API] 预约提交失败:', e.message);
      return { success: false, error: e.message };
    }
  }
}

// ==================== Data Simulation ====================
function simulateCrowdData() {
  const total = 80 + Math.floor(Math.random() * 71);
  const football = Math.floor(total * (0.15 + Math.random() * 0.15));
  const track = Math.floor(total * (0.2 + Math.random() * 0.15));
  const basketball = Math.floor(total * (0.1 + Math.random() * 0.1));
  const fitness = Math.floor(total * (0.08 + Math.random() * 0.08));
  const indoor = total - football - track - basketball - fitness;
  return { total, zones: { football, track, basketball, fitness, indoor }, timestamp: Date.now() };
}

function simulateWeatherData() {
  const temp = 22 + Math.floor(Math.random() * 20);
  const humidity = 30 + Math.floor(Math.random() * 51);
  const wind = 1 + Math.floor(Math.random() * 8);
  const solarRadiation = 200 + Math.floor(Math.random() * 600);
  const surfaceTemp = temp + (humidity * 0.05) + (wind * -0.3) + (solarRadiation * 0.015);
  return { temp, humidity, wind, solarRadiation, surfaceTemp: Math.round(surfaceTemp), timestamp: Date.now() };
}

function simulateReservations() {
  const venues = [];
  for (let i = 0; i < 6; i++) {
    const slots = [];
    for (let h = 16; h < 22; h++) slots.push({ hour: h, booked: Math.random() < 0.35 });
    venues.push({ id: i, name: `场地${String.fromCharCode(65 + i)}`, slots });
  }
  return { venues, timestamp: Date.now() };
}

// Running Track
function createRunningTrack() {
  const group = new THREE.Group();
  const outerShape = new THREE.Shape();
  const a = 9, b = 5.5, segments = 64;
  for (let i = 0; i <= segments; i++) {
    const angle = (i / segments) * Math.PI * 2;
    const x = Math.cos(angle) * a, z = Math.sin(angle) * b;
    if (i === 0) outerShape.moveTo(x, z); else outerShape.lineTo(x, z);
  }
  const innerHole = new THREE.Path();
  const ai = 7, bi = 4;
  for (let i = 0; i <= segments; i++) {
    const angle = (i / segments) * Math.PI * 2;
    const x = Math.cos(angle) * ai, z = Math.sin(angle) * bi;
    if (i === 0) innerHole.moveTo(x, z); else innerHole.lineTo(x, z);
  }
  outerShape.holes.push(innerHole);
  const geo = new THREE.ExtrudeGeometry(outerShape, { depth: 0.08, bevelEnabled: true, bevelThickness: 0.02, bevelSize: 0.02, bevelSegments: 3 });
  geo.rotateX(-Math.PI / 2);
  const track = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color: 0xd4382e, roughness: 0.6, metalness: 0.05 }));
  track.position.y = 0.01;
  track.receiveShadow = true;
  track.castShadow = true;
  group.add(track);
  for (let lane = 0; lane < 4; lane++) {
    const r = 7.5 + lane * 0.35, r2 = 4.25 + lane * 0.35;
    const pts = [];
    for (let i = 0; i <= 100; i++) {
      const angle = (i / 100) * Math.PI * 2;
      pts.push(new THREE.Vector3(Math.cos(angle) * r, 0.06, Math.sin(angle) * r2));
    }
    group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.3 })));
  }
  return group;
}

  const legGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.12, 6);

function distributeCrowd(count) {
  stickFigures.forEach(f => scene.remove(f));
  stickFigures.length = 0;
  raycasterTargets.length = 0;
  const zones = [
    { name: 'football', cx: 0, cz: 0, rx: 5.5, rz: 3 },
    { name: 'track', cx: 0, cz: 0, rx: 8.5, rz: 5, rxInner: 7, rzInner: 4, ring: true },
    { name: 'basketball', cx: 11, cz: 0, rx: 2.5, rz: 4.5 },
    { name: 'fitness', cx: 0, cz: -9, rx: 3, rz: 3.5 },
    { name: 'indoor', cx: 0, cz: 10, rx: 5, rz: 4 },
  ];
  for (let i = 0; i < count; i++) {
    const zone = zones[Math.floor(Math.random() * zones.length)];
    let x, z;
    if (zone.ring) {
      const angle = Math.random() * Math.PI * 2;
      const r = zone.rxInner + Math.random() * (zone.rx - zone.rxInner);
      const rz2 = zone.rzInner + Math.random() * (zone.rz - zone.rzInner);
      x = zone.cx + Math.cos(angle) * r;
      z = zone.cz + Math.sin(angle) * rz2;
    } else {
      x = zone.cx + (Math.random() - 0.5) * zone.rx * 2;
      z = zone.cz + (Math.random() - 0.5) * zone.rz * 2;
    }
    const figure = createStickFigure();
    figure.position.set(x, 0.02, z);
    figure.userData.baseY = 0.02;
    figure.userData.zone = zone.name;
    scene.add(figure);
    stickFigures.push(figure);
  }
}

// Heatmap
let heatmapMesh;
function createHeatmap() {
  const canvas = document.createElement('canvas');
  canvas.width = 512;
  canvas.height = 512;
  const tex = new THREE.CanvasTexture(canvas);
  tex.minFilter = THREE.LinearFilter;
  tex.magFilter = THREE.LinearFilter;
  const geo = new THREE.PlaneGeometry(30, 24);
  const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, opacity: 0.45, depthWrite: false });
  heatmapMesh = new THREE.Mesh(geo, mat);
  heatmapMesh.rotation.x = -Math.PI / 2;
  heatmapMesh.position.y = 0.04;
  scene.add(heatmapMesh);
  heatmapMesh._canvas = canvas;
  heatmapMesh._tex = tex;
}

function updateHeatmap(zoneData) {
  if (!heatmapMesh) return;
  const canvas = heatmapMesh._canvas;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 512, 512);
  const zoneMap = {
    football: { x: 256, y: 256, rx: 180, ry: 100 },
    track: { x: 256, y: 256, rx: 280, ry: 170 },
    basketball: { x: 420, y: 256, rx: 80, ry: 140 },
    fitness: { x: 256, y: 430, rx: 100, ry: 110 },
    indoor: { x: 256, y: 80, rx: 160, ry: 120 },
  };
  const maxDensity = 50;
  Object.entries(zoneData).forEach(([zone, count]) => {
    const pos = zoneMap[zone];
    if (!pos) return;
    const density = Math.min(count / maxDensity, 1);
    const gradient = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, Math.max(pos.rx, pos.ry));
    const r = Math.floor(30 + density * 225), g = Math.floor(200 - density * 170), b = Math.floor(255 - density * 200);
    gradient.addColorStop(0, `rgba(${r},${g},${b},${0.15 + density * 0.7})`);
    gradient.addColorStop(0.5, `rgba(${r},${g},${b},${(0.15 + density * 0.7) * 0.5})`);
    gradient.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, 512, 512);
  });
  heatmapMesh._tex.needsUpdate = true;
}

// Raycaster
const raycaster = new THREE.Raycaster();
raycaster.far = 20;
const mouse = new THREE.Vector2();
let hoveredFigure = null;
const tooltip = document.getElementById('tooltip');
function onMouseMove(e) {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(raycasterTargets, false);
  if (hoveredFigure) {
    hoveredFigure.children.forEach(c => { if (c.material && c.material.emissive) c.material.emissive.set(0x000000); });
    hoveredFigure = null;
    tooltip.style.opacity = '0';
  }
  if (intersects.length > 0) {
    const obj = intersects[0].object;
    if (obj.userData.parentGroup) {
      hoveredFigure = obj.userData.parentGroup;
      hoveredFigure.children.forEach(c => { if (c.material && c.material.emissive) { c.material.emissive = new THREE.Color(0x444444); c.material.emissiveIntensity = 0.5; } });
      const zoneNames = { football: '足球场', track: '跑道', basketball: '篮球场', fitness: '健身区', indoor: '室内体育馆' };
      tooltip.textContent = `位置: ${zoneNames[hoveredFigure.userData.zone] || '未知区域'}`;
      tooltip.style.left = (e.clientX + 15) + 'px';
      tooltip.style.top = (e.clientY - 30) + 'px';
      tooltip.style.opacity = '1';
    }
  }
}
window.addEventListener('mousemove', onMouseMove, { passive: true });

// UI State
let crowdData = { total: 0, zones: { football: 0, track: 0, basketball: 0, fitness: 0, indoor: 0 } };
let weatherData = { temp: 28, humidity: 55, wind: 3, surfaceTemp: 32 };
let reservationData = { venues: [] };
let selectedVenue = null;
let selectedHour = null;

function getDensityColor(ratio) {
  if (ratio < 0.3) return 'var(--lime)';
  if (ratio < 0.6) return 'var(--amber)';
  return 'var(--magenta)';
}
function getDensityLevel(ratio) {
  if (ratio < 0.3) return 'LOW';
  if (ratio < 0.6) return 'MED';
  return 'HIGH';
}

function updateCrowdPanel(data) {
  crowdData = data;
  document.getElementById('total-crowd').textContent = data.total;
  const ratio = data.total / 150;
  const totalBar = document.getElementById('total-density-bar');
  totalBar.style.width = (ratio * 100) + '%';
  totalBar.style.background = getDensityColor(ratio);
  const levelEl = document.getElementById('density-level');
  levelEl.textContent = getDensityLevel(ratio);
  levelEl.style.color = getDensityColor(ratio);
  const zoneMax = { football: 35, track: 45, basketball: 25, fitness: 20, indoor: 35 };
  Object.entries(data.zones).forEach(([zone, count]) => {
    const bar = document.getElementById('bar-' + zone);
    if (bar) {
      const r = count / zoneMax[zone];
      bar.style.width = (r * 100) + '%';
      bar.style.background = getDensityColor(r);
    }
    const zoneRow = document.querySelector(`#bar-${zone}`)?.closest('.zone-item')?.querySelector('.zone-name span:last-child');
    if (zoneRow) zoneRow.textContent = count;
  });
}

function updateWeatherPanel(data) {
  weatherData = data;
  document.getElementById('val-temp').textContent = data.temp + '°C';
  document.getElementById('val-humidity').textContent = data.humidity + '%';
  document.getElementById('val-wind').textContent = data.wind + 'm/s';
  const surfaceEl = document.getElementById('val-surface');
  surfaceEl.textContent = data.surfaceTemp + '°C';
  surfaceEl.classList.toggle('warning', data.surfaceTemp > 40);
  const rec = getSportsRecommendation(data.temp, data.surfaceTemp);
  document.getElementById('rec-text').innerHTML = `${rec.icon} ${rec.text}<br><span style="color:var(--muted);font-size:11px">建议着装: ${rec.clothing}</span>`;
}

function updateReservationPanel(data) {
  reservationData = data;
  const list = document.getElementById('venue-list');
  let html = '';
  data.venues.forEach((venue, idx) => {
    html += `<div class="venue-row"><span class="venue-name">${venue.name}</span><div class="timeline">`;
    venue.slots.forEach(slot => {
      let cls = slot.booked ? 'booked' : 'available';
      if (selectedVenue === idx && selectedHour === slot.hour) cls += ' selected';
      html += `<div class="time-slot ${cls}" data-venue="${idx}" data-hour="${slot.hour}">${slot.hour}</div>`;
    });
    html += `</div></div>`;
  });
  list.innerHTML = html;
  list.querySelectorAll('.time-slot.available').forEach(el => {
    el.addEventListener('click', () => { selectedVenue = parseInt(el.dataset.venue); selectedHour = parseInt(el.dataset.hour); updateReservationPanel(reservationData); updateReserveButton(); });
  });
  list.querySelectorAll('.time-slot.booked').forEach(el => {
    el.addEventListener('click', () => { selectedVenue = null; selectedHour = null; updateReservationPanel(reservationData); updateReserveButton(); });
  });
}

// ==================== API Config Panel ====================
const api = new StadiumAPIService(true);

const apiToggle = document.getElementById('api-toggle-switch');
const apiToggleWrap = document.getElementById('api-toggle-wrapper');
const apiStatusInd = document.getElementById('api-status-indicator');
const apiStatusText = document.getElementById('api-status-text');
const apiMsg = document.getElementById('api-msg');
const inputCrowd = document.getElementById('api-crowd');
const inputReservations = document.getElementById('api-reservations');
const inputBook = document.getElementById('api-book');

function updateApiUI() {
  const labels = document.querySelectorAll('.api-toggle-label');
  if (api.useRealAPI) {
    apiToggle.classList.add('on');
    apiStatusInd.classList.remove('off'); apiStatusInd.classList.add('on');
    apiStatusText.textContent = '真实 API 模式';
    apiStatusText.style.color = 'var(--lime)';
    labels.forEach(l => l.classList.toggle('active', l.dataset.mode === 'real'));
    inputCrowd.disabled = false; inputReservations.disabled = false; inputBook.disabled = false;
  } else {
    apiToggle.classList.remove('on');
    apiStatusInd.classList.remove('on'); apiStatusInd.classList.add('off');
    apiStatusText.textContent = '模拟数据模式';
    apiStatusText.style.color = 'var(--magenta)';
    labels.forEach(l => l.classList.toggle('active', l.dataset.mode === 'mock'));
    inputCrowd.disabled = true; inputReservations.disabled = true; inputBook.disabled = true;
  }
  inputCrowd.value = api.config.crowdUrl || '';
  inputReservations.value = api.config.reservationsUrl || '';
  inputBook.value = api.config.bookUrl || '';
}

apiToggleWrap.addEventListener('click', () => {
  api.setUseRealAPI(!api.useRealAPI);
  updateApiUI();
  refreshData();
  apiMsg.textContent = '';
  apiMsg.className = 'api-msg';
});

// Direct click on the switch itself
document.getElementById('api-toggle-switch').addEventListener('click', (e) => {
  e.stopPropagation();
  api.setUseRealAPI(!api.useRealAPI);
  updateApiUI();
  refreshData();
  apiMsg.textContent = '';
  apiMsg.className = 'api-msg';
});

// Click on labels to toggle
document.querySelectorAll('.api-toggle-label').forEach(label => {
  label.addEventListener('click', (e) => {
    e.stopPropagation();
    const mode = label.dataset.mode;
    if ((mode === 'real' && api.useRealAPI) || (mode === 'mock' && !api.useRealAPI)) return;
    api.setUseRealAPI(mode === 'real');
    updateApiUI();
    refreshData();
  });
});

document.getElementById('btn-api-test').addEventListener('click', async () => {
  api.setConfig({
    crowdUrl: inputCrowd.value.trim(),
    reservationsUrl: inputReservations.value.trim(),
    bookUrl: inputBook.value.trim()
  });
  apiMsg.textContent = 'TESTING...';
  apiMsg.className = 'api-msg';
  try {
    await refreshData();
    apiMsg.textContent = 'CONNECTED';
    apiMsg.className = 'api-msg success';
  } catch (e) {
    apiMsg.textContent = 'FAILED: ' + e.message;
    apiMsg.className = 'api-msg error';
  }
  setTimeout(() => { apiMsg.textContent = ''; apiMsg.className = 'api-msg'; }, 3000);
});

updateApiUI();

// ==================== Reservation Logic ====================
function updateReserveButton() {
  const btn = document.getElementById('btn-reserve');
  const info = document.getElementById('reserve-info');
  if (selectedVenue !== null && selectedHour !== null) {
    btn.disabled = false;
    info.textContent = `已选: ${reservationData.venues[selectedVenue].name} ${selectedHour}:00`;
    info.style.color = 'var(--cyan)';
  } else {
    btn.disabled = true;
    info.textContent = '点击上方时段选择场地';
    info.style.color = 'var(--muted)';
  }
}

document.getElementById('btn-reserve').addEventListener('click', async () => {
  if (selectedVenue === null || selectedHour === null) return;
  const duration = parseInt(document.getElementById('duration-select').value);
  const venue = reservationData.venues[selectedVenue];
  const booking = {
    venueId: venue.id,
    venueName: venue.name,
    hour: selectedHour,
    duration,
    timestamp: Date.now()
  };
  // Submit to API
  const result = await api.bookReservation(booking);
  if (result.success) {
    // Update local state
    venue.slots.forEach(s => { if (s.hour >= selectedHour && s.hour < selectedHour + duration) s.booked = true; });
    selectedVenue = null; selectedHour = null;
    updateReservationPanel(reservationData);
    updateReserveButton();
    const btn = document.getElementById('btn-reserve');
    btn.textContent = '已预约!';
    btn.style.background = 'rgba(0,255,135,0.15)';
    btn.style.borderColor = 'rgba(0,255,135,0.6)';
    btn.style.color = 'var(--lime)';
    btn.style.boxShadow = '0 0 20px rgba(0,255,135,0.3)';
    setTimeout(() => {
      btn.textContent = '确认预约';
      btn.style.background = 'transparent';
      btn.style.borderColor = 'rgba(0,240,255,0.4)';
      btn.style.color = 'var(--cyan)';
      btn.style.boxShadow = 'none';
      btn.disabled = true;
      updateReserveButton();
    }, 1500);
  } else {
    alert('预约提交失败: ' + (result.error || '未知错误'));
  }
});

// ==================== Data Refresh ====================
async function refreshData() {
  const [crowd, weather, reservations] = await Promise.all([api.fetchCrowdData(), api.fetchWeatherData(), api.fetchReservations()]);
  updateCrowdPanel(crowd);
  updateWeatherPanel(weather);
  updateReservationPanel(reservations);
  updateReserveButton();
  const zoneList = ['football', 'track', 'basketball', 'fitness', 'indoor'];
  const maxPerZone = { football: 35, track: 45, basketball: 25, fitness: 20, indoor: 35 };
  if (webglOk) {
    statusLights.forEach((light, i) => {
      const zone = zoneList[i] || 'football';
      const count = crowd.zones[zone] || 0;
      const ratio = count / (maxPerZone[zone] || 30);
      let color;
      if (ratio > 0.7) color = new THREE.Color(0xef4444);
      else if (ratio > 0.4) color = new THREE.Color(0xfacc15);
      else color = new THREE.Color(0x4ade80);
      light.material.color.set(color);
      light.material.emissive.set(color);
    });
    updateHeatmap(crowd.zones);
  }
}

// Animation
const clock = new THREE.Clock();
function animate() {
  if (!webglOk) return;
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  controls.update();
  stickFigures.forEach(fig => { fig.position.y = fig.userData.baseY + Math.sin(t * fig.userData.floatSpeed + fig.userData.floatPhase) * fig.userData.floatAmp; });
  if (particles) {
    const pos = particles.geometry.attributes.position.array;
    for (let i = 0; i < pos.length / 3; i++) { pos[i * 3 + 1] += 0.003; if (pos[i * 3 + 1] > 8) pos[i * 3 + 1] = 0; }
    particles.geometry.attributes.position.needsUpdate = true;
    particles.rotation.y += 0.0005;
  }
  statusLights.forEach(light => { light.material.emissiveIntensity = 0.8 + Math.sin(t * 3 + light.userData.phase) * 0.4; });
  renderer.render(scene, camera);
}

function onResize() {
  if (!webglOk) return;
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}
window.addEventListener('resize', onResize);

if (webglOk) {
  distributeCrowd(115);
  createHeatmap();
  animate();
}
refreshData();
setInterval(refreshData, 8000);
if (webglOk) {
setInterval(() => {
  const newCount = 80 + Math.floor(Math.random() * 71);
  const diff = newCount - stickFigures.length;
  const zones = ['football', 'track', 'basketball', 'fitness', 'indoor'];
  const centers = { football: [0, 0, 5.5, 3], track: [0, 0, 8.5, 5], basketball: [11, 0, 2.5, 4.5], fitness: [0, -9, 3, 3.5], indoor: [0, 10, 5, 4] };
  if (diff > 0) {
    for (let i = 0; i < Math.min(diff, 5); i++) {
      const zone = zones[Math.floor(Math.random() * zones.length)];
      const [cx, cz, rx, rz] = centers[zone];
      const fig = createStickFigure();
      fig.position.set(cx + (Math.random() - 0.5) * rx * 2, 0.02, cz + (Math.random() - 0.5) * rz * 2);
      fig.userData.baseY = 0.02; fig.userData.zone = zone;
      scene.add(fig); stickFigures.push(fig);
    }
  } else if (diff < 0) {
    for (let i = 0; i < Math.min(-diff, 5); i++) {
      if (!stickFigures.length) break;
      const idx = Math.floor(Math.random() * stickFigures.length);
      const fig = stickFigures[idx];
      scene.remove(fig);
      const ti = raycasterTargets.findIndex(t => t.userData.parentGroup === fig);
      if (ti >= 0) raycasterTargets.splice(ti, fig.children.length);
      stickFigures.splice(idx, 1);
    }
  }
}, 5000);
}
