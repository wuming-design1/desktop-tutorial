# 团队工作流智能看板 - Docker Compose 部署
# 使用: docker compose up -d

version: "3.8"

services:
  # 后端 API 服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: workflow-backend
    restart: always
    environment:
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-change-me-to-a-strong-random-string-32chars}
      - JWT_EXPIRES_IN=7d
      - DB_PATH=./data/app.db
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      - CORS_ORIGIN=http://localhost
      - LOG_LEVEL=info
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@audit.local}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123456}
    volumes:
      - backend_data:/app/data
    networks:
      - workflow-net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 5s
      retries: 3

  # 前端 + Nginx
  frontend:
    image: nginx:alpine
    container_name: workflow-frontend
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./frontend:/app/frontend:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - workflow-net

volumes:
  backend_data:
    driver: local

networks:
  workflow-net:
    driver: bridge